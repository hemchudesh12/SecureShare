{% extends 'base.html' %}
{% block content %}
<div class="page-header">
  <h1>🔑 Change Password</h1>
  <p>Your private key will be securely re-encrypted with your new password.</p>
</div>

<div class="card" style="max-width: 500px;">
  <form method="POST" action="{{ url_for('auth.change_password') }}">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

    <div class="form-group">
      <label class="form-label" for="old_password">Current Password</label>
      <input type="password" class="form-control" id="old_password" name="old_password" required autocomplete="current-password"
             placeholder="Your current password">
    </div>

    <div class="form-group">
      <label class="form-label" for="new_password">New Password</label>
      <input type="password" class="form-control" id="new_password" name="new_password" required autocomplete="new-password" minlength="8"
             placeholder="Minimum 8 characters">
    </div>

    <div class="alert-box alert-warning" style="margin-top:20px; margin-bottom: 20px;">
      <span>⚠️</span>
      <div>
        Changing your password re-encrypts your private key. Previously encrypted files will remain accessible.
      </div>
    </div>

    <button type="submit" class="btn btn-primary btn-full" style="padding:12px;">Change Password</button>
  </form>
</div>
{% endblock %}
