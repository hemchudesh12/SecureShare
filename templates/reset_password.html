{% extends 'base.html' %}
{% block content %}
<div class="auth-card">
    <h2>🔑 Change Password</h2>
    <p class="step-label">Enter your username and current password to set a new one.</p>

    <form method="POST" action="{{ url_for('reset_password') }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

        <label for="username">Username</label>
        <input type="text" id="username" name="username" required autocomplete="username" placeholder="Your username">

        <label for="old_password">Current Password</label>
        <input type="password" id="old_password" name="old_password" required autocomplete="current-password"
            placeholder="Your current password">

        <label for="new_password">New Password</label>
        <input type="password" id="new_password" name="new_password" required autocomplete="new-password" minlength="8"
            placeholder="Minimum 8 characters">

        <button type="submit" class="btn-primary full-width">Change Password</button>
    </form>

    <p class="auth-link"><a href="{{ url_for('auth.login') }}">Back to Login</a></p>
</div>
{% endblock %}
